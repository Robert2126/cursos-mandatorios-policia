<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asesor Normativo Policial</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Cursos mandatorios</p>
      <h1>Asesor Normativo Policial</h1>
      <p>Consulta académica basada en las fuentes oficiales incorporadas al sistema.</p>
    </header>
    <section id="messages" class="messages" aria-live="polite"></section>
    <form id="chat-form">
      <label for="question">Pregunta del estudiante</label>
      <textarea id="question" rows="4" required placeholder="Ejemplo: ¿Cuál es el procedimiento aplicable en una captura en flagrancia?"></textarea>
      <button type="submit">Consultar</button>
    </form>
    <p class="notice">La orientación no sustituye órdenes de mando, protocolos vigentes ni asesoría jurídica institucional.</p>
  </main>
  <script src="/static/widget.js"></script>
</body>
</html>
